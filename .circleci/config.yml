The documented slash commands are built-in interface shortcuts, for example in the macOS app for search, reasoning, and image generation, and /canvas for opening Canvas. 
But you can create pseudo-slash commands that I will understand if you define them in a chat, in a Project instruction, in Custom Instructions, or possibly as a reusable Skill. OpenAI's Skills feature is the closest official mechanism for reusable custom workflows, although it is not the same thing as adding a new UI slash command. 

A good structure is this:

When I type /command_name, interpret it as the following instruction:

Purpose:
...

Inputs:
- ...

Behavior:
1. ...
2. ...
3. ...

Output format:
...

Example:
User: /command_name ...
Assistant: ...
For example:
When I type /fixsyntax, correct the English syntax of the text that follows.

Rules:
- Preserve my meaning.
- Do not make the text too formal unless I ask.
- Give only the corrected version unless there is an important ambiguity.

Example:
User: /fixsyntax I was invited to attend to the conference on July 2027.
Assistant: I was invited to attend the conference in July 2027.
Then you could write:
/fixsyntax
I was invited to attend to WSC 2027 conference in Lusaka, Zambia on July 2027.
Another useful one for you could be:
When I type /matlabdebug, analyze the MATLAB code that follows.

Rules:
- First identify syntax errors.
- Then identify possible runtime errors.
- Then suggest a corrected version.
- Prefer code compatible with recent MATLAB releases.
- Explain changes briefly.
Or:
When I type /latexpolish, improve the LaTeX text that follows.

Rules:
- Preserve all LaTeX commands and labels.
- Improve English style.
- Do not change mathematical meaning.
- Return the corrected LaTeX block only.
So the practical answer is: not true custom slash commands in the ChatGPT interface, but yes, you can define your own command-like shortcuts in natural language and I can follow them.

how to delete the last commit preserving files in git 

Thought for a couple of seconds
Use git reset on the previous commit.
Best option: delete last commit but keep changes staged
git reset --soft HEAD~1
This removes the last commit, but keeps all its file changes in the staging area. You can then recommit:
git commit -m "New commit message"
Delete last commit but keep changes unstaged
git reset --mixed HEAD~1
or simply:
git reset HEAD~1
This removes the last commit and keeps the modified files in your working directory, but unstaged.
Summary
Goal	Command
Remove last commit, keep files staged	git reset --soft HEAD~1
Remove last commit, keep files unstaged	git reset --mixed HEAD~1
Remove last commit and delete file changes	git reset --hard HEAD~1
Be careful with:
git reset --hard HEAD~1
because it deletes the changes from the last commit.
If the commit was already pushed to GitHub, after reset you would need:

git push --force-with-lease
but use that only if you are sure, because it rewrites remote history.

Qualcomm® Kryo™ 670 is an ARM architecture? Can you compare it with the Raspberry Pi 5?

Worked for 52s
Yes, but only in a limited way.
As of MATLAB R2026a, MathWorks supports MATLAB on Windows on Arm devices with Qualcomm Snapdragon X series chips, but MATLAB runs through Microsoft Prism emulation, not natively on Arm. MathWorks explicitly says: "MATLAB does not currently run natively on Windows ARM devices" MathWorks MATLAB Answers. The Windows requirements also list Qualcomm Snapdragon X series as the ARM minimum, with the note that MATLAB runs in Prism emulation MathWorks Windows requirements.

Snapdragon case	MATLAB support
Snapdragon X Elite / X Plus laptop with Windows 11 ARM	Yes, R2026a, via Prism emulation
Native MATLAB for Windows ARM	No, not currently
Snapdragon Android phone/tablet	No full local MATLAB; MATLAB Mobile connects to a cloud MATLAB session
Snapdragon Linux ARM board/laptop	No full MATLAB desktop support; Linux MATLAB still requires Intel/AMD x86-64 MathWorks Linux requirements
Apple Silicon ARM Mac	Yes, native MATLAB on A/M-series Macs MathWorks Mac requirements
So, if you mean a Snapdragon X Windows laptop, the answer is yes, but emulated. If you mean a Snapdragon 778G / Android device, the answer is no, not as a normal local MATLAB installation. MATLAB Mobile on Android is mainly a front end to a MATLAB session running in the MathWorks Cloud MATLAB Mobile.

