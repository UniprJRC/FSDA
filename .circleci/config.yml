# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/2.0/configuration-reference
version: 2.1

# Use a package of configuration called an orb.
orbs:
  # Declare a dependency on the MATLAB orb
  matlab: mathworks/matlab@1  # latest orb version

jobs:
  # Name the job "testing"
  testing:
    # Parameter used to segment the tests to overcome the 50-minute limit.
    parameters:
      q:
        default: "regression"
        type: string
    environment:
      # Parametric environment variable used by the MATLAB testing script
      # "runAllMyTestsFS.m" via: var = getenv('CATEGORY_TO_TEST');
      CATEGORY_TO_TEST: << parameters.q >>
    machine:
      image: ubuntu-latest
    steps:
      - checkout
      - matlab/install:
          release: R2026a
          products: >-
            Optimization_Toolbox
            Statistics_and_Machine_Learning_Toolbox
            Bioinformatics_Toolbox
            Parallel_Computing_Toolbox
      - matlab/run-command:  # previously `matlab -batch ...`
          command: "run ./toolbox/runAllMyTestsFS.m"
      - run:
          name: Ensure test result directory exists
          command: mkdir -p "$HOME/project/tests-<< parameters.q >>/toolbox/test-<< parameters.q >>-report"
          when: always
      - store_test_results:
          path: ~/project/tests-<< parameters.q >>/toolbox/test-<< parameters.q >>-report/

# Orchestrate or schedule a set of jobs
workflows:
  # Name of the workflow
  fsdatoolbox:
    jobs:
      # Run the "testing" job in its own container for each parameter value
      - testing:
          matrix:
            parameters:
              q: ["regression", "regressionTS", "regressionLTSts", "regressionEXT", "graphics", "multivariate", "multivariate-clustering", "Probability-Distribution", "regression-clustering", "mixsim", "utilities", "tclustMULT", "tclustMULTgpcm", "FMvol"]