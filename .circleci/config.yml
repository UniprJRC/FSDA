

I want to test a pull request without merging it to the main branch, what are my best options?

Thought for 11s
Most likely because macOS does not currently see two or more normal Spaces for MATLAB on that display.
Apple's rule is: you can assign an app to a Space only "when you're using two or more spaces." The assignment is done from the Dock: Control-click the app icon → Options → Assign To. 

Try this:

Press Control + ↑ to open Mission Control.
At the top, check that you really have at least:
Desktop 1    Desktop 2
not only one Desktop plus a full-screen app.
Create a real second desktop with the + button.
Go to Desktop 2.
Open or activate MATLAB there.
Right-click MATLAB in the Dock → Options → Assign To → This Desktop.
Important: a full-screen app is also shown in Mission Control, but it is not the same as a normal Desktop Space. If your "second desktop" is actually MATLAB, Safari, or another app in full-screen mode, the assignment option may be unavailable or confusing.
Also check this setting:

System Settings → Desktop & Dock → Mission Control

Make sure Spaces are enabled normally, and consider turning off:

When switching to an application, switch to a Space with open windows for the application
Apple notes that this setting is exactly what causes macOS to jump automatically to a Space where the app already has windows. 
For MATLAB specifically, even if you fix the macOS setting, the more reliable solution is still to prevent figure windows from becoming active:

set(groot,'defaultFigureVisible','off')
or for individual figures:
f = figure('Visible','off');
plot(x,y)
exportgraphics(f,'myfigure.png')
close(f)
In your case I would first create a real Desktop 2, not a full-screen Space, then retry the Dock assignment.

