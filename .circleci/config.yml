do you know how to open a led undercabinet panel which light is now broken? my model is called "GAP fly fondo luminoso" There should be a way to avoid to dismantle all the cabinet.

Worked for 45s
Yes, usually you should not need to dismantle the whole cabinet. But first: switch off power at the breaker, not only the wall switch. These panels often have a 12/24 V LED strip, but the driver may be connected to 230 V.
For a "fondo luminoso" undercabinet panel, the access is usually one of these:

Removable opal diffuser
Look for a milky/opal plastic or glass cover. Try to slide it sideways, or gently pry from one short end with a plastic card/spudger. Many diffusers are clipped into an aluminium frame.
Front or side aluminium profile cap
At one end there may be a tiny plastic/metal end cap. If you remove the cap, the diffuser may slide out, exposing the LED strip.
Small hidden screws
Check the left/right ends and the rear edge near the wall. Sometimes there are tiny Phillips/Torx screws hidden under caps or silicone dots.
Spring clips
Some panels are held like recessed spotlights: pull down gently at one corner. If it drops a few millimetres, spring clips are holding it. Support it carefully because wires may be short.
Driver failure, not LED failure
If the whole light is dead, very often the problem is the LED driver/transformer, not the LED panel. The driver may be hidden above the wall cabinet, inside the cabinet, or behind a removable cover. Replacing the driver is often easier than opening the luminous bottom.
What I would do:
Turn off power.
Inspect the two short sides of the luminous panel for caps or screws.
Try gently to see whether the translucent diffuser slides.
Look inside the cabinet immediately above the light for a removable bottom/false panel or cable exit.
If there is an external driver, test/replace that first.
Avoid forcing the glass/plastic diffuser from the middle: if it is clipped, it can crack. Start from an end.
If you can send me one or two photos, especially of the front edge, side end, and inside of the cabinet above the light, I can probably tell you which opening system it uses.

