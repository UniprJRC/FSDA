config.yml
File
On CicrcleCI this config.yml files gives me this error:
Unable to save test results from /home/circleci/project/tests-regression/toolbox/test-regression-report
Error error accessing path "/home/circleci/project/tests-regression/toolbox/test-regression-report": stat /home/circleci/project/tests-regression/toolbox/test-regression-report: no such file or directory
Found no test results, skipping

how can I fix it?

Worked for 22s
The error means CircleCI reaches this step:
- store_test_results:
    path: ~/project/tests-<< parameters.q >>/toolbox/test-<< parameters.q >>-report/
but that folder was not created by your MATLAB test script, at least for q = "regression".
For example, CircleCI expected:

/home/circleci/project/tests-regression/toolbox/test-regression-report
but it does not exist.
A simple robust fix is to create the directory before store_test_results, and make that step run even if MATLAB tests fail:

        - matlab/run-command:
            command: "run ./toolbox/runAllMyTestsFS.m"

        - run:
            name: Ensure test result directory exists
            command: mkdir -p "$HOME/project/tests-<< parameters.q >>/toolbox/test-<< parameters.q >>-report"
            when: always

        - store_test_results:
            path: ~/project/tests-<< parameters.q >>/toolbox/test-<< parameters.q >>-report/
However, this only removes the "no such file or directory" error. To make CircleCI actually show test results, your MATLAB script must write JUnit XML files inside that folder.
In MATLAB, the key idea is something like:

reportFolder = fullfile(pwd, ...
    ['tests-' getenv('CATEGORY_TO_TEST')], ...
    'toolbox', ...
    ['test-' getenv('CATEGORY_TO_TEST') '-report']);

mkdir(reportFolder)

import matlab.unittest.TestRunner
import matlab.unittest.plugins.XMLPlugin

runner = TestRunner.withTextOutput;
runner.addPlugin(XMLPlugin.producingJUnitFormat( ...
    fullfile(reportFolder,'junit.xml')));

results = runner.run(suite);
So the best fix is:
Make runAllMyTestsFS.m create the same folder used by CircleCI.
Make it write a JUnit XML file there.
Add mkdir -p ... when: always in config.yml as a safety net.
If your MATLAB script creates a different folder name, then instead change the CircleCI path: to match the real folder.

the CircleCI.yml files code:

# Declare a dependency on the MATLAB-orb
  matlab: mathworks/matlab@0 # latest orb version
gives this error:
WARNING: The specified version of the MATLAB orb is no longer supported. Update your configuration to use the most recent version of the orb.

what is the last orb supported?

Worked for 1m 28s
Use:
orbs:
  matlab: mathworks/matlab@1
So replace your current line:
matlab: mathworks/matlab@0
with:
matlab: mathworks/matlab@1
MathWorks' current CircleCI examples use mathworks/matlab@1, while your @0 version is now old and unsupported MathWorks MATLAB CircleCI orb.
So your block should become:

# Use a package of configuration called an orb.
orbs:
  # Declare a dependency on the MATLAB orb
  matlab: mathworks/matlab@1
Important: after changing the orb version, push a new commit. CircleCI notes that rerunning an old workflow may not fetch a newer orb version; a new pipeline should be triggered CircleCI orb versioning.
If you want to check the exact resolved version locally, you can run:

circleci orb info mathworks/matlab
But for your config.yml, mathworks/matlab@1 is the right supported form.

