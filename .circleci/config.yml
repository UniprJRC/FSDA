can I create my own slash commands, how is the structure you need to create one?

I'll check the current ChatGPT product docs first, because slash-command behavior is interface-dependent and has changed across web/macOS/mobile.
Thought for 10s
You cannot, as far as the current official ChatGPT docs show, register your own real slash commands in the ChatGPT UI like:
