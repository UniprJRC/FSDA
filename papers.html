    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>

        const prefix = 'https://raw.githubusercontent.com/UniprJRC/FSDA/master/';

        function addPrefixToSrcAttributes(htmlString, prefix) {
            // Crea un elemento temporaneo per analizzare il contenuto HTML
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlString, 'text/html');

            // Seleziona tutti gli elementi che hanno l'attributo src
            const elements = doc.querySelectorAll('[src]');

            // Itera su tutti gli elementi trovati
            elements.forEach(element => {
                // Ottieni il valore attuale dell'attributo src
                let src = element.getAttribute('src');

                // Verifica se l'URL è già assoluto
                if (!src.match(/^(?:https?:\/\/|\/|\/\/)/)) {
                    // Aggiungi il prefisso solo se l'URL è relativo
                    src = prefix + src;
                }

                // Imposta il nuovo valore dell'attributo src
                element.setAttribute('src', src);
            });

            // Converti il documento modificato nuovamente in una stringa HTML
            return doc.documentElement.outerHTML;
        }

        // Funzione per caricare diversi contenuti
        function loadContent() {
            const contentDiv = document.getElementById('software-content');

            loadGitHubREADME();
        }

        // Funzione per caricare README.md dal repository GitHub
        function loadGitHubREADME(startHeading = null, endHeading = null, opposite = false) {
            fetch('https://raw.githubusercontent.com/UniprJRC/FSDApapers/refs/heads/main/readme.md')
                .then(res => {
                    if (!res.ok) {
                        throw new Error(`HTTP error! status: ${res.status}`);
                    }
                    return res.text();
                })
                .then(text => {
                    // Converti il Markdown in HTML
                    // console.log(text);
                    let newText = text;
                    if (startHeading && endHeading) 
                    {
                        const startIndex = text.indexOf(startHeading);
                        const endIndex = text.indexOf(endHeading);
                        if(opposite)
                        {
                            let begin = text.substring(0,startIndex);
                            let end = text.substring(endIndex);
                            newText  = begin + end;    
                        }
                        else
                        {
                            console.log("between");
                            newText = text.substring(startIndex,endIndex);
                            console.log(newText);
                        }
                    }
                    let htmlContent = marked.parse(newText);                    
                    htmlContent = addPrefixToSrcAttributes(htmlContent, prefix);
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlContent, 'text/html');

                    let processedHtml = doc.body.innerHTML;

                    
                    // Inserisci il risultato finale nel div
                    document.getElementById('software-content').innerHTML = "<div style='min-height:30px;'></div>" + processedHtml;
                })
                .catch(err => {
                    console.error("Errore nel caricamento del README: ", err);
                    document.getElementById('software-content').innerHTML =
                        '<p>Errore nel caricamento della documentazione GitHub.</p>';
                });
        }

        // Carica il contenuto di default all'avvio della pagina
        document.addEventListener('DOMContentLoaded', function () {
            loadContent(); // Carica la sezione software di default
        });
    </script>
